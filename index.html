<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Structure Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header style="position: relative; display: flex; justify-content: center; align-items: center; flex-direction: column;">
            <h1>Data Structure Visualizer</h1>
            <p>Interactive visualizations of fundamental data structures</p>
            <button id="theme-toggle" class="btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
        </header>

        <section class="controls-section">
            <div class="control-group">
                <label for="ds-select">Structure</label>
                <div class="select-wrapper">
                    <select id="ds-select">
                        <option value="stack">Stack</option>
                        <option value="queue">Queue</option>
                        <option value="sll">Singly Linked List</option>
                        <option value="dll">Doubly Linked List</option>
                        <option value="bst">Binary Search Tree (BST)</option>
                        <option value="avl">AVL Tree</option>
                        <option value="pq">Priority Queue</option>
                        <option value="deque">Double-Ended Queue</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <label for="val-input">Value</label>
                <input type="number" id="val-input" placeholder="Enter number..." autocomplete="off" />
            </div>

            <div class="control-group" id="pq-priority-wrapper" style="display: none; min-width: 120px;">
                <label for="pq-priority">Priority</label>
                <input type="number" id="pq-priority" placeholder="Priority..." autocomplete="off" />
            </div>

            <div class="control-group" id="deque-pos-wrapper" style="display: none; min-width: 120px;">
                <label for="deque-pos">Position</label>
                <div class="select-wrapper">
                    <select id="deque-pos">
                        <option value="rear">Rear</option>
                        <option value="front">Front</option>
                    </select>
                </div>
            </div>

            <div class="button-group">
                <button id="btn-insert" class="btn btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Insert
                </button>
                <button id="btn-delete" class="btn btn-danger">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    Delete
                </button>
            </div>
        </section>

        <div id="message-container" class="message-container hidden">
        </div>

        <main class="visualization-area">
            <div id="empty-state" class="empty-state">
                <p>Canvas is empty. Insert a value to begin!</p>
            </div>
            <div id="canvas" class="canvas">
            </div>
        </main>
    </div>

    <script src="utils.js"></script>
    <script src="stack.js"></script>
    <script src="queue.js"></script>
    <script src="priority-queue.js"></script>
    <script src="deque.js"></script>
    <script src="linked-list.js"></script>
    <script src="tree.js"></script>
    <script src="main.js"></script>
</body>
</html>
